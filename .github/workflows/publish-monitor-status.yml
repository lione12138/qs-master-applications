name: Publish monitoring status

on:
  schedule:
    # Run after the data-review workflow so the public status reflects a
    # completed daily scan without publishing unreviewed deadline changes.
    - cron: "47 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: publish-monitor-status
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Check official entry pages
        run: |
          gradwindow validate
          gradwindow monitor --workers 16
          gradwindow monitor-sources --workers 8

      - name: Publish completed-check status
        id: publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ops/monitor-state.json data/ops/application-source-state.json
          if git diff --cached --quiet; then
            echo "No monitoring-status changes to publish."
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: publish daily monitoring status"
          git push
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Build the published status
        if: steps.publish.outputs.published == 'true'
        env:
          GRADWINDOW_SUBSCRIBE_URL: ${{ vars.GRADWINDOW_SUBSCRIBE_URL }}
          GRADWINDOW_TURNSTILE_SITE_KEY: ${{ vars.GRADWINDOW_TURNSTILE_SITE_KEY }}
          GRADWINDOW_ROADMAP_URL: ${{ vars.GRADWINDOW_ROADMAP_URL }}
        run: gradwindow build-site

      - name: Configure Pages
        if: steps.publish.outputs.published == 'true'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: steps.publish.outputs.published == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy the published status
        if: steps.publish.outputs.published == 'true'
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Notify search engines with IndexNow
        if: steps.publish.outputs.published == 'true'
        run: >-
          python3 scripts/submit_indexnow.py
          --sitemap site/sitemap.xml
          --key-file site/ffcdfa5871ff4d52aed733120c248bf8.txt
