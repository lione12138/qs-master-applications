name: Refresh active programme adapters

on:
  schedule:
    - cron: "37 6 * * *"
  workflow_dispatch:
    inputs:
      max_adapters:
        description: Maximum stale active adapters to refresh
        required: false
        default: "8"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gradwindow-data-writes
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Refresh stale active adapters
        env:
          MAX_ADAPTERS: ${{ inputs.max_adapters || '8' }}
          SERPER_SEARCH_API_KEY: ${{ secrets.SERPER_SEARCH_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_BROWSER_API_TOKEN: ${{ secrets.CLOUDFLARE_BROWSER_API_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
        run: >-
          gradwindow discover-scheduled-programmes
          --tier active
          --min-age-days 7
          --max-adapters "$MAX_ADAPTERS"
      - name: Validate discovery outputs
        run: |
          gradwindow validate
          pytest -q
      - name: Open or update active-adapter review pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "data: refresh active programme adapters"
          branch: automation/active-programme-refresh
          delete-branch: true
          title: "data: review active programme-adapter refresh"
          body: |
            Refreshes a bounded set of adapters with current window candidates.
            Each adapter is eligible only after seven days since its last
            successful snapshot. Outputs remain review candidates.
          add-paths: |
            data/ops/programme-candidates.json
            data/ops/programme-candidates/
            data/ops/window-candidates.json
            data/ops/window-candidates/
            data/ops/programme-catalog-state.json
            data/ops/programme-catalog-state/
            data/ops/reports/adapter-completion.json
