name: Scan low-frequency programme catalogues

on:
  schedule:
    - cron: "13 7 * * 0"
  workflow_dispatch:
    inputs:
      max_adapters:
        description: Maximum stale catalogue-only adapters to scan
        required: false
        default: "6"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gradwindow-data-writes
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Scan stale catalogue-only adapters
        env:
          MAX_ADAPTERS: ${{ inputs.max_adapters || '6' }}
        run: >-
          gradwindow discover-scheduled-programmes
          --tier catalogue
          --min-age-days 30
          --max-adapters "$MAX_ADAPTERS"
      - name: Scan generic primary catalogues
        env:
          SERPER_SEARCH_API_KEY: ${{ secrets.SERPER_SEARCH_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_BROWSER_API_TOKEN: ${{ secrets.CLOUDFLARE_BROWSER_API_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
        run: gradwindow discover-generic-batch --role primary
      - name: Refresh completion report
        run: gradwindow adapter-completion
      - name: Validate discovery outputs
        run: |
          gradwindow validate
          pytest -q
      - name: Open or update catalogue-scan review pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "data: scan programme catalogues"
          branch: automation/programme-catalogue-scan
          delete-branch: true
          title: "data: review low-frequency programme catalogue scan"
          body: |
            Scans a bounded set of catalogue-only dedicated adapters after at
            least 30 days, plus generic primary catalogues. Discovery outputs
            remain operational review data and are never auto-published.
          add-paths: |
            data/ops/programme-candidates.json
            data/ops/programme-candidates/
            data/ops/window-candidates.json
            data/ops/window-candidates/
            data/ops/programme-catalog-state.json
            data/ops/programme-catalog-state/
            data/ops/reports/
