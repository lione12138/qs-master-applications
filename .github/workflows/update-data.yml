name: Update application windows

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: update-application-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: |
          gradwindow predictions
          pytest

      - name: Run daily pipeline
        run: gradwindow pipeline

      - name: Commit verified changes
        run: |
          if git diff --quiet -- data/applications.json data/predictions.json data/application-source-state.json data/coverage.json data/monitor-state.json data/review-queue.json data/window-candidates.json reports/; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "gradwindow-bot"
          git config user.email "gradwindow-bot@users.noreply.github.com"
          git add data/applications.json data/predictions.json data/application-source-state.json data/coverage.json data/monitor-state.json data/review-queue.json data/window-candidates.json reports/
          git commit -m "data: refresh application windows"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push

      - name: Open issue for newly confirmed page changes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const queue = JSON.parse(fs.readFileSync("data/review-queue.json", "utf8"));
            const candidates = JSON.parse(fs.readFileSync("data/window-candidates.json", "utf8"));
            const universities = JSON.parse(fs.readFileSync("data/universities.json", "utf8"));
            const universityById = new Map(
              universities.universities.map(item => [item.id, item])
            );
            const today = new Date().toISOString().slice(0, 10);
            const monitorChanges = queue.items.filter(
              item => ["content-change", "window-source-change"].includes(item.type) &&
                item.status === "pending" &&
                item.detectedAt.startsWith(today)
            );
            const parserChanges = candidates.items.filter(
              item => item.type === "parser-date-change" &&
                item.status === "pending" &&
                item.detectedAt.startsWith(today)
            ).map(item => {
              const university = universityById.get(item.record.universityId) || {};
              return {
                qsRank: university.qsRank || "?",
                school: university.school || item.record.universityId,
                url: item.sourceUrl,
                reason: `Parser proposed ${item.record.opensAt} to ${item.record.closesAt}; manual approval required.`
              };
            });
            const changes = [...monitorChanges, ...parserChanges];
            if (!changes.length) return;

            const marker = `<!-- gradwindow-review:${today} -->`;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100
            });
            if (existing.some(issue => issue.body?.includes(marker))) return;

            const rows = changes.map(item =>
              `| ${item.qsRank} | ${item.school} | [official page](${item.url}) | ${item.reason} |`
            ).join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Review confirmed admissions-page changes (${today})`,
              body: `${marker}
            The monitor observed the same new visible-content fingerprint on two consecutive checks.

            | QS | University | Source | Reason |
            |---:|---|---|---|
            ${rows}

            Review the official pages before changing any application window.`
            });
