name: Update application windows

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: update-application-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run daily pipeline
        run: gradwindow pipeline --skip-build

      - name: Update programme translations
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "DEEPSEEK_API_KEY is not configured; skipping programme translations."
            exit 0
          fi
          python scripts/update_programme_translations.py

      - name: Open or update data review pull request
        id: data-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "data: refresh application windows"
          branch: automation/application-data
          delete-branch: true
          title: "data: review automated application-window refresh"
          body: |
            Automated daily refresh of monitoring state, parser candidates,
            predictions, evidence snapshots, coverage, and review reports.

            No parser candidate is promoted into `applications.json` without
            explicit maintainer approval.
          add-paths: |
            data/applications.json
            data/predictions.json
            data/programme-translations.json
            data/evidence/
            data/coverage.json
            data/ops/
            README.md
            README.zh-CN.md

      - name: Run tests on the data review branch
        if: steps.data-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run tests.yml --ref automation/application-data

      - name: Open issue for newly confirmed page changes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const queue = JSON.parse(fs.readFileSync("data/ops/review-queue.json", "utf8"));
            const candidates = JSON.parse(fs.readFileSync("data/ops/window-candidates.json", "utf8"));
            const universities = JSON.parse(fs.readFileSync("data/universities.json", "utf8"));
            const universityById = new Map(
              universities.universities.map(item => [item.id, item])
            );
            const today = new Date().toISOString().slice(0, 10);
            const monitorChanges = queue.items.filter(
              item => ["content-change", "window-source-change"].includes(item.type) &&
                item.severity === "deadline" &&
                item.status === "pending" &&
                item.detectedAt.startsWith(today)
            );
            const parserChanges = candidates.items.filter(
              item => item.type === "parser-date-change" &&
                item.status === "pending" &&
                item.detectedAt.startsWith(today)
            ).map(item => {
              const university = universityById.get(item.record.universityId) || {};
              return {
                qsRank: university.qsRank || "?",
                school: university.school || item.record.universityId,
                url: item.sourceUrl,
                reason: `Parser proposed ${item.record.opensAt} to ${item.record.closesAt}; manual approval required.`
              };
            });
            const changes = [...monitorChanges, ...parserChanges];
            if (!changes.length) return;

            const marker = `<!-- gradwindow-review:${today} -->`;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100
            });
            if (existing.some(issue => issue.body?.includes(marker))) return;

            const rows = changes.map(item =>
              `| ${item.qsRank} | ${item.school} | [official page](${item.url}) | ${item.reason} |`
            ).join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Review confirmed admissions-page changes (${today})`,
              body: `${marker}
            The monitor observed the same new visible-content fingerprint on two consecutive checks.

            | QS | University | Source | Reason |
            |---:|---|---|---|
            ${rows}

            Review the official pages before changing any application window.`
            });
