name: Update application windows

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      translation_only:
        description: "Only update missing programme translations"
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - "data/applications.json"
      - "data/predictions.json"
      - "data/programs.json"
      - "data/programme-groups.json"
      - "data/programme-translations.json"
      - "data/universities.json"
      - "data/ops/programme-candidates.json"
      - "data/ops/programme-candidates/**"
      - "data/ops/window-candidates.json"
      - "data/ops/window-candidates/**"
      - "data/ops/programme-catalog-state.json"
      - "data/ops/programme-catalog-state/**"
      - "scripts/update_programme_translations.py"
      - "src/gradwindow/**"
      - ".github/workflows/update-data.yml"

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: update-application-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Validate pushed data
        if: github.event_name == 'push'
        run: |
          gradwindow predictions
          gradwindow validate
          gradwindow coverage

      - name: Run daily pipeline
        if: github.event_name != 'push' && !inputs.translation_only
        env:
          SERPER_SEARCH_API_KEY: ${{ secrets.SERPER_SEARCH_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_BROWSER_API_TOKEN: ${{ secrets.CLOUDFLARE_BROWSER_API_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
        run: gradwindow pipeline --skip-build

      - name: Update programme translations
        if: github.event_name != 'push'
        id: programme_translations
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "DEEPSEEK_API_KEY is not configured; skipping programme translations."
            exit 0
          fi
          python scripts/update_programme_translations.py

      - name: Report programme translation failure
        if: >-
          github.event_name != 'push' &&
          steps.programme_translations.outcome == 'failure'
        run: |
          echo "::warning title=Programme translation update failed::The data pipeline succeeded, but DeepSeek translation failed. Successfully checkpointed batches will still be included in the data review pull request."
          {
            echo "### Programme translation warning"
            echo ""
            echo "The application-data pipeline succeeded, but the optional DeepSeek translation step failed."
            echo "Successfully checkpointed translation batches are preserved and the data review pull request will still be created."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit translation-only refresh
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.translation_only &&
          steps.programme_translations.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/programme-translations.json
          if git diff --cached --quiet; then
            echo "No translation changes to commit."
            exit 0
          fi
          git commit -m "data: translate published programmes"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Open or update data review pull request
        if: github.event_name != 'push' && !inputs.translation_only
        id: data-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "data: refresh application windows"
          branch: automation/application-data
          delete-branch: true
          title: "data: review automated application-window refresh"
          body: |
            Automated daily refresh of monitoring state, parser candidates,
            programme-discovery candidates, predictions, evidence snapshots,
            coverage, and review reports.

            Dedicated adapters automatically promote only complete application
            windows with official exact opening and closing dates. Inferred or
            incomplete windows and parser date changes still require explicit
            approval.
          add-paths: |
            data/applications.json
            data/predictions.json
            data/programme-translations.json
            data/evidence/
            data/coverage.json
            data/ops/
            README.md
            README.zh-CN.md

      - name: Run tests on the data review branch
        if: >-
          github.event_name != 'push' &&
          !inputs.translation_only &&
          steps.data-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run tests.yml --ref automation/application-data

      - name: Open issue for newly confirmed page changes
        if: github.event_name != 'push' && !inputs.translation_only
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const readJson = filename => {
              const payload = JSON.parse(fs.readFileSync(filename, "utf8"));
              if (!payload.partitioning) return payload;
              const { collectionKey, groupKey, files } = payload.partitioning;
              const collection = groupKey ? [] : {};
              for (const relativeName of files) {
                const shard = JSON.parse(
                  fs.readFileSync(path.join(path.dirname(filename), relativeName), "utf8")
                )[collectionKey];
                if (groupKey) collection.push(...shard);
                else Object.assign(collection, shard);
              }
              return { meta: payload.meta || {}, [collectionKey]: collection };
            };
            const queue = JSON.parse(fs.readFileSync("data/ops/review-queue.json", "utf8"));
            const candidates = readJson("data/ops/window-candidates.json");
            const programmeCandidates = readJson("data/ops/programme-candidates.json");
            const universities = JSON.parse(fs.readFileSync("data/universities.json", "utf8"));
            const universityById = new Map(
              universities.universities.map(item => [item.id, item])
            );
            const today = new Date().toISOString().slice(0, 10);
            const monitorChanges = queue.items.filter(
              item => ["content-change", "window-source-change"].includes(item.type) &&
                item.severity === "deadline" &&
                item.status === "pending" &&
                item.detectedAt.startsWith(today)
            );
            const parserChanges = candidates.items.filter(
              item => item.type === "parser-date-change" &&
                item.status === "pending" &&
                item.detectedAt.startsWith(today)
            ).map(item => {
              const university = universityById.get(item.record.universityId) || {};
              return {
                qsRank: university.qsRank || "?",
                school: university.school || item.record.universityId,
                url: item.sourceUrl,
                reason: `Parser proposed ${item.record.opensAt} to ${item.record.closesAt}; manual approval required.`
              };
            });
            const newProgrammes = programmeCandidates.items.filter(
              item => item.type === "new-programme" &&
                item.status === "pending" &&
                item.detectedAt.startsWith(today)
            ).map(item => {
              const university = universityById.get(item.universityId) || {};
              return {
                qsRank: university.qsRank || "?",
                school: university.school || item.universityId,
                url: item.sourceUrl,
                reason: `New programme discovered: ${item.programme.name}; ${item.windows.length} deadline candidate(s) require review.`
              };
            });
            const changes = [...monitorChanges, ...parserChanges, ...newProgrammes];
            if (!changes.length) return;

            const marker = `<!-- gradwindow-review:${today} -->`;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100
            });
            if (existing.some(issue => issue.body?.includes(marker))) return;

            const rows = changes.map(item =>
              `| ${item.qsRank} | ${item.school} | [official page](${item.url}) | ${item.reason} |`
            ).join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Review confirmed admissions-page changes (${today})`,
              body: `${marker}
            The monitor observed the same new visible-content fingerprint on two consecutive checks.

            | QS | University | Source | Reason |
            |---:|---|---|---|
            ${rows}

            Review the official pages before changing any application window.`
            });
