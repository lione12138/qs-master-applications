name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Prepare generated contracts
        run: |
          gradwindow predictions
          gradwindow export-schemas
      - name: Test
        run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Build deployable site
        env:
          GRADWINDOW_SUBSCRIBE_URL: ${{ vars.GRADWINDOW_SUBSCRIBE_URL }}
          GRADWINDOW_TURNSTILE_SITE_KEY: ${{ vars.GRADWINDOW_TURNSTILE_SITE_KEY }}
          GRADWINDOW_ROADMAP_URL: ${{ vars.GRADWINDOW_ROADMAP_URL }}
        run: gradwindow build-site
      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-build
          path: site
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 3
