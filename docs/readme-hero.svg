<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title description">
  <title id="title">GradWindow</title>
  <desc id="description">Official-source master's application windows for QS Top 200 universities.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d3f32"/>
      <stop offset="1" stop-color="#1e6548"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#ffb627"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#05251c" flood-opacity=".34"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#background)"/>
  <circle cx="1110" cy="-18" r="220" fill="#2a7c5b" opacity=".48"/>
  <circle cx="1176" cy="16" r="112" fill="#3b936e" opacity=".34"/>
  <circle cx="1030" cy="405" r="150" fill="#0a362b" opacity=".38"/>

  <g transform="translate(78 72)">
    <rect width="66" height="66" rx="18" fill="url(#accent)" filter="url(#shadow)"/>
    <text x="33" y="46" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="37" font-weight="800" fill="#164d3b">G</text>
    <text x="86" y="47" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="750" fill="#fffdf7">GradWindow</text>
  </g>

  <text x="78" y="219" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="760" fill="#fffdf7">Graduate deadlines,</text>
  <text x="78" y="287" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="760" fill="url(#accent)">without the guesswork.</text>
  <text x="81" y="338" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#d7ede4">Official sources · exact dates · transparent estimates · calendar-ready</text>

  <g transform="translate(820 88)" filter="url(#shadow)">
    <rect width="284" height="202" rx="22" fill="#fffdf7"/>
    <rect width="284" height="54" rx="22" fill="#f3b72e"/>
    <rect y="32" width="284" height="22" fill="#f3b72e"/>
    <circle cx="48" cy="27" r="6" fill="#164d3b" opacity=".5"/>
    <circle cx="70" cy="27" r="6" fill="#164d3b" opacity=".5"/>
    <text x="24" y="93" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1e6548">APPLICATION WINDOW</text>
    <text x="24" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" fill="#173e32">OPEN NOW</text>
    <path d="M24 150h236" stroke="#dbe8e2" stroke-width="2"/>
    <circle cx="36" cy="174" r="8" fill="#2d936c"/>
    <text x="54" y="181" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#49665c">Verified source</text>
  </g>

  <path d="M81 374h408" stroke="#72c79f" stroke-width="3" stroke-linecap="round" opacity=".65"/>
</svg>
