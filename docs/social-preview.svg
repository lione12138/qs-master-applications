  <text x="82" y="310" font-family="Segoe UI, Arial, sans-serif" font-size="67" font-weight="770" fill="#fffdf7">Graduate deadlines,</text>
  <text x="82" y="387" font-family="Segoe UI, Arial, sans-serif" font-size="67" font-weight="770" fill="url(#gold)">without the guesswork.</text>
  <text x="86" y="440" font-family="Segoe UI, Arial, sans-serif" font-size="25" fill="#d7ede4">Searchable application windows backed by official university sources.</text>

