<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">GradWindow</title>
  <desc id="description">Official-source master's application windows for QS Top 200 universities.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3b2f"/>
      <stop offset="1" stop-color="#1e6548"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#ffb627"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#05251c" flood-opacity=".38"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <circle cx="1200" cy="-40" r="286" fill="#2b7f5d" opacity=".44"/>
  <circle cx="1250" cy="-12" r="148" fill="#45a47a" opacity=".25"/>
  <circle cx="1080" cy="650" r="230" fill="#082f26" opacity=".42"/>
  <path d="M0 568C250 505 436 610 674 552c218-54 376-39 606 34v54H0Z" fill="#0a352a" opacity=".52"/>

